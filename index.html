<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask Loora</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    background:#f4f6fb;
}

.container{
    display:flex;
    height:100vh;
}

.sidebar{
    width:250px;
    background:#4B3F92;
    color:white;
    padding:20px;
}

.sidebar h2{
    margin-bottom:20px;
    text-align:center;
}

.topic{
    background:rgba(255,255,255,0.1);
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
    cursor:pointer;
}

.topic:hover{
    background:rgba(255,255,255,0.2);
}

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.header{
    background:white;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#4B3F92;
    border-bottom:1px solid #ddd;
}

.chat-box{
    flex:1;
    padding:20px;
    overflow-y:auto;
    background:#f9f9fc;
}

.message{
    max-width:75%;
    padding:12px 16px;
    margin-bottom:15px;
    border-radius:12px;
    line-height:1.5;
}

.bot{
    background:white;
    border:1px solid #ddd;
}

.user{
    background:#4B3F92;
    color:white;
    margin-left:auto;
}

.input-area{
    display:flex;
    padding:15px;
    background:white;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    padding:14px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

button{
    margin-left:10px;
    padding:14px 25px;
    border:none;
    background:#E35D91;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#D24A80;
}

</style>

</head>

<body>

<div class="container">

```
<div class="sidebar">

    <h2>QA Topics</h2>

    <div class="topic">Greeting</div>
    <div class="topic">Verification</div>
    <div class="topic">PDPA</div>
    <div class="topic">Empathy</div>
    <div class="topic">Solution</div>
    <div class="topic">Closing</div>
    <div class="topic">WOW Factor</div>

</div>

<div class="main">

    <div class="header">
        Ask Loora
    </div>

    <div class="chat-box" id="chatBox">

        <div class="message bot">
            👋 Welcome to Ask Loora.<br><br>
            Ask me anything about QA guidelines, SOP, empathy, call handling and quality standards.
        </div>

    </div>

    <div class="input-area">

        <input
            type="text"
            id="userInput"
            placeholder="Ask Loora anything..."
        >

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>
```

</div>

<script>

const knowledgeBase = {

    greeting:
    "Hi, ABC, I am [Agent Name], how may I assist you today?",

    verification:
    "Verify customer details and repeat information for confirmation.",

    pdpa:
    "Follow PDPA and PCI DSS requirements at all times.",

    empathy:
    "Acknowledge customer emotions and show understanding.",

    solution:
    "Provide accurate information according to SOP and policy.",

    closing:
    "Thank you for contacting ABC. Have a nice day.",

    wow:
    "Deliver a positive customer experience and exceed expectations."

};

function sendMessage(){

    let input =
    document.getElementById("userInput");

    let message =
    input.value.trim();

    if(message === "") return;

    let chatBox =
    document.getElementById("chatBox");

    chatBox.innerHTML += `
        <div class="message user">
            ${message}
        </div>
    `;

    let msg =
    message.toLowerCase();

    let reply =
    "Sorry, I couldn't find information related to that topic.";

    if(msg.includes("greeting"))
        reply = knowledgeBase.greeting;

    else if(msg.includes("verification"))
        reply = knowledgeBase.verification;

    else if(msg.includes("pdpa"))
        reply = knowledgeBase.pdpa;

    else if(msg.includes("empathy"))
        reply = knowledgeBase.empathy;

    else if(msg.includes("solution"))
        reply = knowledgeBase.solution;

    else if(msg.includes("closing"))
        reply = knowledgeBase.closing;

    else if(msg.includes("wow"))
        reply = knowledgeBase.wow;

    chatBox.innerHTML += `
        <div class="message bot">
            ${reply}
        </div>
    `;

    chatBox.scrollTop =
    chatBox.scrollHeight;

    input.value = "";

}

document
.getElementById("userInput")
.addEventListener("keypress", function(event){

    if(event.key === "Enter"){
        sendMessage();
    }

});

</script>

</body>
</html>
