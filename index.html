<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask Loora</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background:#f4f6f9;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:90%;
    max-width:900px;
    height:90vh;
    background:white;
    border-radius:16px;
    box-shadow:0 8px 25px rgba(0,0,0,0.12);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.header{
    background:white;
    border-bottom:1px solid #e5e7eb;
    padding:16px;
    text-align:center;
}

.title{
    font-size:20px;
    font-weight:600;
    color:#4B3F92;
}

.subtitle{
    font-size:12px;
    color:#888;
    margin-top:3px;
}

.chat-box{
    flex:1;
    padding:20px;
    overflow-y:auto;
    background:#f8f9fc;
}

.message{
    margin-bottom:12px;
    max-width:75%;
    padding:10px 14px;
    border-radius:12px;
    line-height:1.5;
    font-size:14px;
}

.user{
    background:#4B3F92;
    color:white;
    margin-left:auto;
}

.bot{
    background:white;
    border:1px solid #e5e7eb;
    color:#333;
}

.input-area{
    display:flex;
    padding:15px;
    border-top:1px solid #e5e7eb;
    background:white;
}

input{
    flex:1;
    padding:12px;
    border:1px solid #d1d5db;
    border-radius:10px;
    font-size:14px;
    outline:none;
}

input:focus{
    border-color:#4B3F92;
}

button{
    margin-left:10px;
    padding:12px 22px;
    border:none;
    background:#E35D91;
    color:white;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
    font-weight:500;
}

button:hover{
    background:#D24A80;
}

</style>

</head>

<body>

<div class="chat-container">

```
<div class="header">
    <div class="title">Ask Loora</div>
    <div class="subtitle">QA Knowledge Assistant</div>
</div>

<div class="chat-box" id="chatBox">

    <div class="message bot">
        <strong>Welcome to Ask Loora</strong><br><br>

        Your QA Knowledge Assistant.<br><br>

        Ask me about:
        <br>• Greeting
        <br>• Email Verification
        <br>• Complaint Handling
        <br>• Empathy
        <br>• Quality Standards
    </div>

</div>

<div class="input-area">

    <input
        type="text"
        id="userInput"
        placeholder="Ask Loora anything..."
    >

    <button onclick="sendMessage()">
        Send
    </button>

</div>
```

</div>

<script>

function sendMessage(){

    let input =
    document.getElementById("userInput");

    let message =
    input.value.trim();

    if(message === ""){
        return;
    }

    let chatBox =
    document.getElementById("chatBox");

    chatBox.innerHTML += `
        <div class="message user">
            ${message}
        </div>
    `;

    let reply =
    "Thank you for your question. AI integration will be connected in the next step.";

    if(message.toLowerCase().includes("greeting")){
        reply =
        "Hi, ABC. I am [Agent Name]. How may I assist you today?";
    }

    if(message.toLowerCase().includes("email")){
        reply =
        "Agent must request the customer's email address and repeat it back for verification.";
    }

    if(message.toLowerCase().includes("complaint")){
        reply =
        "Verify details, acknowledge customer emotions and create an escalation ticket when required.";
    }

    if(message.toLowerCase().includes("empathy")){
        reply =
        "Use empathy statements such as: I understand how frustrating this situation must be for you.";
    }

    chatBox.innerHTML += `
        <div class="message bot">
            ${reply}
        </div>
    `;

    chatBox.scrollTop =
    chatBox.scrollHeight;

    input.value = "";

}

document
.getElementById("userInput")
.addEventListener("keypress", function(event){

    if(event.key === "Enter"){
        sendMessage();
    }

});

</script>

</body>
</html>
