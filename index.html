<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask Loora</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', Arial, sans-serif;
    background:linear-gradient(
        135deg,
        #D9DCE3 0%,
        #F2F4F8 50%,
        #FFFFFF 100%
    );
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:90%;
    max-width:950px;
    height:90vh;
    background:white;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(75,63,146,0.15);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.header{
    background:#4B3F92;
    color:white;
    padding:15px 25px;
    display:flex;
    align-items:center;
    position:relative;
}

.logo-section img{
    height:45px;
    width:auto;
}

.title-section{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    font-size:28px;
    font-weight:700;
    letter-spacing:0.5px;
}

.chat-box{
    flex:1;
    padding:20px;
    overflow-y:auto;
    background:#F7F8FC;
}

.message{
    margin-bottom:15px;
    max-width:75%;
    padding:12px 15px;
    border-radius:15px;
    line-height:1.6;
    word-wrap:break-word;
}

.user{
    background:#4B3F92;
    color:white;
    margin-left:auto;
    border-bottom-right-radius:5px;
}

.bot{
    background:#F7F3FF;
    border:1px solid #E5DFFF;
    color:#333;
    border-bottom-left-radius:5px;
}

.input-area{
    display:flex;
    padding:15px;
    background:white;
    border-top:1px solid #eee;
}

input{
    flex:1;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
    outline:none;
}

input:focus{
    border-color:#4B3F92;
}

button{
    margin-left:10px;
    padding:14px 25px;
    border:none;
    background:#E35D91;
    color:white;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    background:#D24A80;
}

</style>

</head>

<body>

<div class="chat-container">

```
<div class="header">

    <div class="logo-section">
        <img src="logo.png" alt="Company Logo">
    </div>

    <div class="title-section">
        Ask Loora
    </div>

</div>

<div class="chat-box" id="chatBox">

    <div class="message bot">
        👋 Hi! I'm Loora.<br><br>

        How can I help you today?
    </div>

</div>

<div class="input-area">

    <input
        type="text"
        id="userInput"
        placeholder="Ask Loora anything..."
    >

    <button onclick="sendMessage()">
        Send
    </button>

</div>
```

</div>

<script>

function sendMessage(){

    let input =
    document.getElementById("userInput");

    let message =
    input.value.trim();

    if(message === ""){
        return;
    }

    let chatBox =
    document.getElementById("chatBox");

    chatBox.innerHTML += `
        <div class="message user">
            ${message}
        </div>
    `;

    let reply =
    "Thank you for your question. AI integration will be connected in the next phase.";

    let msg = message.toLowerCase();

    if(msg.includes("greeting") || msg.includes("greet")){
        reply =
        "Good morning/afternoon, thank you for calling ABC Retail Careline. My name is [Agent Name]. How may I assist you today?";
    }

    else if(msg.includes("email") || msg.includes("probing")){
        reply =
        "Agent must request the customer's email address and repeat it back for verification.";
    }

    else if(msg.includes("complaint")){
        reply =
        "For complaint cases: Verify details, acknowledge customer concerns, create escalation ticket and document the issue clearly.";
    }

    else if(msg.includes("empathy") || msg.includes("emotion")){
        reply =
        "Use empathy statements such as: 'I understand how frustrating this situation must be for you.'";
    }

    else if(msg.includes("score")){
        reply =
        "Please paste the call transcript and I will assist with QA evaluation criteria.";
    }

    chatBox.innerHTML += `
        <div class="message bot">
            ${reply}
        </div>
    `;

    chatBox.scrollTop =
    chatBox.scrollHeight;

    input.value = "";

}

document
.getElementById("userInput")
.addEventListener("keypress", function(event){

    if(event.key === "Enter"){
        sendMessage();
    }

});

</script>

</body>
</html>
