<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loora Chatbot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    /* background ikut logo */
    background: linear-gradient(135deg, #766AAE, #853D76);
}

/* CHAT CONTAINER */
.chatbot{
    width:370px;
    height:600px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
    display:flex;
    flex-direction:column;
}

/* HEADER */
.header{
    background: linear-gradient(135deg, #766AAE, #853D76);
    color:white;
    padding:15px;
    display:flex;
    align-items:center;
    gap:10px;
}

/* logo dot style */
.dot{
    width:12px;
    height:12px;
    background:#B23241;
    border-radius:50%;
    box-shadow:0 0 0 3px white;
}

.header h3{
    font-size:16px;
}

/* CHAT AREA */
.chat{
    flex:1;
    padding:10px;
    overflow-y:auto;
    background:#f7f7fb;
}

/* BOT MESSAGE */
.bot{
    background:#e9e6f7;
    padding:10px;
    margin:8px;
    border-radius:10px;
    max-width:80%;
}

/* USER MESSAGE */
.user{
    background:#B23241;
    color:white;
    padding:10px;
    margin:8px;
    border-radius:10px;
    max-width:80%;
    margin-left:auto;
}

/* INPUT AREA */
.input-box{
    display:flex;
    padding:10px;
    border-top:1px solid #ddd;
}

.input-box input{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:10px;
    outline:none;
}

.input-box button{
    background:#766AAE;
    color:white;
    border:none;
    padding:10px 15px;
    margin-left:8px;
    border-radius:10px;
    cursor:pointer;
}

.input-box button:hover{
    background:#853D76;
}
</style>
</head>

<body>

<div class="chatbot">

    <div class="header">
        <div class="dot"></div>
        <h3>Loora AI Assistant</h3>
    </div>

    <div class="chat">
        <div class="bot">Hello! How can I help you today?</div>
        <div class="user">Hi!</div>
        <div class="bot">Saya Loora AI 👋</div>
    </div>

    <div class="input-box">
        <input type="text" placeholder="Type message...">
        <button>Send</button>
    </div>

</div>

</body>
</html>
