<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA AI Assistant</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:90%;
    max-width:900px;
    height:90vh;
    background:white;
    border-radius:15px;
    box-shadow:0 4px 20px rgba(0,0,0,0.15);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.header{
    background:#0066ff;
    color:white;
    padding:20px;
    font-size:22px;
    font-weight:bold;
}

.chat-box{
    flex:1;
    padding:20px;
    overflow-y:auto;
    background:#f7f9fc;
}

.message{
    margin-bottom:15px;
    max-width:75%;
    padding:12px;
    border-radius:12px;
    line-height:1.5;
}

.user{
    background:#0066ff;
    color:white;
    margin-left:auto;
}

.bot{
    background:white;
    border:1px solid #ddd;
}

.input-area{
    display:flex;
    padding:15px;
    border-top:1px solid #ddd;
    background:white;
}

input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

button{
    margin-left:10px;
    padding:12px 25px;
    border:none;
    background:#0066ff;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#0052cc;
}

</style>

</head>

<body>

<div class="chat-container">

    <div class="header">
        QA AI Assistant
    </div>

    <div class="chat-box" id="chatBox">

        <div class="message bot">
            👋 Hello! I'm your QA Assistant.<br><br>

            You can ask:
            <br><br>

            • What is the correct greeting?<br>
            • What is email probing?<br>
            • What should I do for complaint cases?<br>
            • How do I acknowledge customer emotion?<br>
            • Score this call transcript
        </div>

    </div>

    <div class="input-area">

        <input
            type="text"
            id="userInput"
            placeholder="Type your question here..."
        >

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script>

function sendMessage(){

    let input =
    document.getElementById("userInput");

    let message =
    input.value.trim();

    if(message === ""){
        return;
    }

    let chatBox =
    document.getElementById("chatBox");

    chatBox.innerHTML += `
        <div class="message user">
            ${message}
        </div>
    `;

    let reply =
    "Thank you for your question. AI integration will be connected in the next step.";

    if(message.toLowerCase().includes("greeting")){
        reply =
        "Good morning/afternoon, thank you for calling ABC Retail Careline. My name is [Agent Name]. How may I assist you today?";
    }

    if(message.toLowerCase().includes("email")){
        reply =
        "Agent must request customer email address and repeat it back for verification.";
    }

    if(message.toLowerCase().includes("complaint")){
        reply =
        "For complaint cases: Verify details, acknowledge emotion, create escalation ticket, and CSAT is not required.";
    }

    chatBox.innerHTML += `
        <div class="message bot">
            ${reply}
        </div>
    `;

    chatBox.scrollTop =
    chatBox.scrollHeight;

    input.value = "";

}

document
.getElementById("userInput")
.addEventListener("keypress", function(event){

    if(event.key === "Enter"){
        sendMessage();
    }

});

</script>

</body>
</html>
