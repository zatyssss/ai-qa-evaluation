<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask Loora</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CONTAINER */
.chat-container{
    width:420px;
    height:620px;
    background:#0b1220;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* HEADER */
.chat-header{
    background: linear-gradient(90deg, #2563eb, #06b6d4);
    padding:15px;
    color:white;
    font-weight:bold;
    display:flex;
    align-items:center;
    gap:10px;
}

.chat-header span{
    font-size:18px;
}

/* CHAT BOX */
.chat-box{
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* MESSAGE */
.msg{
    padding:10px 14px;
    border-radius:15px;
    max-width:85%;
    font-size:13.5px;
    line-height:1.4;
    white-space:pre-line;
}

.bot{
    background:#1f2937;
    color:white;
    align-self:flex-start;
    border-bottom-left-radius:5px;
}

.user{
    background:#2563eb;
    color:white;
    align-self:flex-end;
    border-bottom-right-radius:5px;
}

/* INPUT */
.chat-input{
    display:flex;
    padding:10px;
    background:#111827;
}

.chat-input input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
    outline:none;
}

.chat-input button{
    margin-left:10px;
    padding:10px 15px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="chat-container">

    <!-- HEADER -->
    <div class="chat-header">
        🤖 <span>Loora AI Assistant</span>
    </div>

    <!-- CHAT -->
    <div class="chat-box" id="chatBox">

        <!-- GREETING -->
        <div class="msg bot">
Hi 👋 I’m Loora Assistant.
How may I help you today?
        </div>

    </div>

    <!-- INPUT -->
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Ask about QA, SOP, PDPA...">
        <button onclick="sendMsg()">Send</button>
    </div>

</div>

<script>

// QA SCORECARD DATA
const qaData = {
"call opening": `
1. Call Opening
- Standard greeting: “Hi, TNG eWallet, I am <agent name>...”
- Greet in correct language
- Friendly, clear, cheerful

- Verify customer name & number
- Mandatory verification if applicable
`,

"pdpa": `
2. PDPA Compliance (CRITICAL ⚠️)
- Must follow PDPA & PCI DSS
- Failure = ZTP / dismissal risk
`,

"call management": `
3. Call Management
- Follow Head → Body → Tail structure
- No interruption
- Check customer history
- Empathy & ownership
`,

"solution": `
4. Solution Match
- Follow SOP / Macro
- Provide accurate information
- Offer alternative solutions
- Give SLA & next steps
`,

"closing": `
7. Call Exit
- Offer CSAT survey if needed
- “Thank you for calling TNG eWallet. Have a nice day.”
`
};

function sendMsg(){
    let input = document.getElementById("userInput");
    let chatBox = document.getElementById("chatBox");

    if(input.value.trim() === "") return;

    // USER MESSAGE
    let userMsg = document.createElement("div");
    userMsg.className = "msg user";
    userMsg.innerText = input.value;
    chatBox.appendChild(userMsg);

    let text = input.value.toLowerCase();

    // BOT RESPONSE
    let botReply = "Sorry, I didn't understand. Try: QA, PDPA, call opening, closing.";

    // QA LOGIC
    if(text.includes("pdpa")){
        botReply = qaData["pdpa"];
    }
    else if(text.includes("call opening")){
        botReply = qaData["call opening"];
    }
    else if(text.includes("call management")){
        botReply = qaData["call management"];
    }
    else if(text.includes("solution")){
        botReply = qaData["solution"];
    }
    else if(text.includes("closing")){
        botReply = qaData["closing"];
    }
    else if(text.includes("qa")){
        botReply = `
📊 QA SCORECARD (Loora AI)

Ask:
- call opening
- PDPA
- call management
- solution
- closing
        `;
    }

    let botMsg = document.createElement("div");
    botMsg.className = "msg bot";

    setTimeout(()=>{
        botMsg.innerText = botReply;
        chatBox.appendChild(botMsg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }, 500);

    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
}

</script>

</body>
</html>
