<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask Loora</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* BACKGROUND */
body{
    background:#F0F3FA;
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* HEADER */
.header{
    text-align:center;
    padding:25px 15px;
    background: linear-gradient(135deg, #473C8B, #EE5F8D);
    color:white;
}

.header img{
    width:60px;
    margin-bottom:8px;
}

.header h1{
    font-size:28px;
}

.header p{
    font-size:13px;
    opacity:0.9;
}

/* CHAT AREA */
.chat-container{
    flex:1;
    padding:20px;
    overflow-y:auto;
}

/* MESSAGE BOX */
.message{
    max-width:70%;
    padding:12px 15px;
    margin:10px 0;
    border-radius:12px;
    font-size:14px;
}

/* BOT */
.bot{
    background:white;
    align-self:flex-start;
    border:1px solid #ddd;
}

/* USER */
.user{
    background:#473C8B;
    color:white;
    align-self:flex-end;
    margin-left:auto;
}

/* INPUT AREA */
.input-area{
    display:flex;
    padding:15px;
    background:white;
    border-top:1px solid #ddd;
}

.input-area input{
    flex:1;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

.input-area button{
    margin-left:10px;
    padding:12px 18px;
    border:none;
    background:#EE5F8D;
    color:white;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="logo.png" alt="Loora Logo">
    <h1>Ask Loora</h1>
    <p>Loora AI Assistant - QA Knowledge Support System</p>
</div>

<!-- CHAT -->
<div class="chat-container" id="chat">
    <div class="message bot">Hi 👋 I am Loora. How can I help you today?</div>
</div>

<!-- INPUT -->
<div class="input-area">
    <input type="text" id="input" placeholder="Type your message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
function sendMessage(){
    let input = document.getElementById("input");
    let chat = document.getElementById("chat");

    if(input.value.trim() === "") return;

    // user message
    let userMsg = document.createElement("div");
    userMsg.className = "message user";
    userMsg.innerText = input.value;
    chat.appendChild(userMsg);

    // bot reply (simple demo)
    let botMsg = document.createElement("div");
    botMsg.className = "message bot";
    botMsg.innerText = "I received: " + input.value;
    chat.appendChild(botMsg);

    input.value = "";
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
