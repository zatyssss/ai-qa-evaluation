<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loora AI Assistant</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* DARK PREMIUM BACKGROUND */
body{
    background: #05010a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CHAT CONTAINER */
.chat-container{
    width:420px;
    height:620px;
    background:#0b0613;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,0.7);
    border:1px solid rgba(255,255,255,0.05);
}

/* HEADER (BRAND MATCHED) */
.chat-header{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 15px;
    background: linear-gradient(90deg, #2b1741, #d21e2f);
    color:white;
}

/* LOGO */
.chat-header img{
    width:35px;
    height:35px;
    object-fit:contain;
    border-radius:6px;
}

/* TITLE */
.chat-header span{
    font-size:16px;
    font-weight:bold;
}

/* CHAT BOX */
.chat-box{
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* MESSAGE BUBBLE */
.msg{
    padding:10px 14px;
    border-radius:15px;
    max-width:85%;
    font-size:13.5px;
    line-height:1.4;
    white-space:pre-line;
}

/* BOT */
.bot{
    background:#1a1026;
    color:#fff;
    align-self:flex-start;
    border-bottom-left-radius:5px;
}

/* USER */
.user{
    background:#d21e2f;
    color:white;
    align-self:flex-end;
    border-bottom-right-radius:5px;
}

/* INPUT */
.chat-input{
    display:flex;
    padding:10px;
    background:#0c0714;
}

.chat-input input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
    outline:none;
}

.chat-input button{
    margin-left:10px;
    padding:10px 15px;
    border:none;
    background:#d21e2f;
    color:white;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="chat-container">

    <!-- HEADER -->
    <div class="chat-header">
        <img src="/mnt/data/6ab6dd46-2b84-43b5-b0d2-a84873911b93.png" alt="Company Logo">
         <span>Ask Loora</span>
    </div>

    <!-- CHAT BOX -->
    <div class="chat-box" id="chatBox">

        <!-- GREETING -->
        <div class="msg bot">
Hi 👋 I’m Loora Assistant.
How may I help you today?
        </div>

    </div>

    <!-- INPUT -->
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Ask about QA, PDPA, SOP...">
        <button onclick="sendMsg()">Send</button>
    </div>

</div>

<script>
function sendMsg(){
    let input = document.getElementById("userInput");
    let chatBox = document.getElementById("chatBox");

    if(input.value.trim() === "") return;

    // USER MESSAGE
    let userMsg = document.createElement("div");
    userMsg.className = "msg user";
    userMsg.innerText = input.value;
    chatBox.appendChild(userMsg);

    // BOT MESSAGE
    let botMsg = document.createElement("div");
    botMsg.className = "msg bot";

    setTimeout(()=>{
        botMsg.innerText = "Got it 👍 I will process your request: " + input.value;
        chatBox.appendChild(botMsg);
        chatBox.scrollTop = chatBox.scrollHeight;
    }, 500);

    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
